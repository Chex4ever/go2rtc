name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.1)'
        required: true
        default: 'v1.2.1'

permissions:
  contents: write

jobs:
  build-go2rtc:
    name: Build go2rtc binaries
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: '386'
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          OUT="go2rtc_${{ steps.ver.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}"
          go build -ldflags "-s -w -X github.com/AlexxIT/go2rtc/internal/app.Version=${{ steps.ver.outputs.version }}" -trimpath -o "$OUT" .

      - name: SHA256
        run: |
          OUT="go2rtc_${{ steps.ver.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}"
          sha256sum "$OUT" | tee "${OUT}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: go2rtc-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            go2rtc_${{ steps.ver.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}
            go2rtc_${{ steps.ver.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}.sha256

  build-updater:
    name: Build go2rtc-updater (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build go2rtc-updater.exe
        run: go build -ldflags "-s -w" -trimpath -o go2rtc-updater.exe ./cmd/go2rtc-updater

      - uses: actions/upload-artifact@v4
        with:
          name: go2rtc-updater-win64
          path: go2rtc-updater.exe

  build-desktop:
    name: Build Camera Wall installer (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync desktop package.json to release tag
        shell: bash
        run: |
          node -e "
          const fs=require('fs');
          const p='desktop/electron-viewer/package.json';
          const j=JSON.parse(fs.readFileSync(p,'utf8'));
          j.version='${{ steps.ver.outputs.version }}';
          fs.writeFileSync(p, JSON.stringify(j, null, 2)+'\n');
          "

      - name: Install, dist, and unpack
        working-directory: desktop/electron-viewer
        run: |
          npm install --no-audit --no-fund
          npm run dist -- --config.directories.output=release-ci
          npm run pack -- --config.directories.output=release-ci-unpacked

      - name: Build shell manifest and patch
        shell: bash
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          OUT="desktop/electron-viewer/release-ci"
          MANIFEST="${OUT}/desktop-shell-manifest-${VER}.json"
          node scripts/desktop-shell-manifest.mjs \
            --output-dir "desktop/electron-viewer/release-ci-unpacked" \
            --version "${VER}" \
            --out "${MANIFEST}"

          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          if [ -z "${PREV_TAG}" ]; then
            echo "::warning::git describe failed for ${TAG}^ — trying latest prior tag"
            PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | grep -v "^${TAG}$" | head -1 || true)
          fi
          if [ -z "${PREV_TAG}" ]; then
            echo "No prior release tag — first release with shell manifests"
            node -e "
            const fs=require('fs');
            const meta={
              version:'${VER}',
              shell_changed:true,
              update_kind:'full',
              changed_files:0,
              changed_bytes:0,
              total_bytes:0,
              patch_file:'',
              patch_sha256:'',
              patch_skip_reason:'first_shell_manifest'
            };
            fs.writeFileSync('${OUT}/desktop-update-meta-${VER}.json', JSON.stringify(meta,null,2)+'\n');
            "
            exit 0
          fi
          PREV_VER="${PREV_TAG#v}"
          PREV_MANIFEST="${OUT}/prev-manifest.json"
          URL="https://github.com/${{ github.repository }}/releases/download/${PREV_TAG}/desktop-shell-manifest-${PREV_VER}.json"
          if curl -fsSL -o "${PREV_MANIFEST}" "${URL}"; then
            node scripts/build-desktop-patch.mjs \
              --output-dir "desktop/electron-viewer/release-ci-unpacked" \
              --from-manifest "${PREV_MANIFEST}" \
              --to-manifest "${MANIFEST}" \
              --out-dir "${OUT}"
            node scripts/validate-desktop-update-meta.mjs \
              --meta "${OUT}/desktop-update-meta-${VER}.json" \
              --from-manifest "${PREV_MANIFEST}" \
              --to-manifest "${MANIFEST}" \
              --out-dir "${OUT}"
          else
            echo "Previous shell manifest not on GitHub (${URL}) — full update only from ${PREV_VER}"
            node -e "
            const fs=require('fs');
            const meta={
              version:'${VER}',
              from:'${PREV_VER}',
              to:'${VER}',
              shell_changed:true,
              update_kind:'full',
              changed_files:0,
              changed_bytes:0,
              total_bytes:0,
              patch_file:'',
              patch_sha256:'',
              patch_skip_reason:'no_prev_manifest_on_release'
            };
            fs.writeFileSync('${OUT}/desktop-update-meta-${VER}.json', JSON.stringify(meta,null,2)+'\n');
            "
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-installer
          path: |
            desktop/electron-viewer/release-ci/*.exe
            desktop/electron-viewer/release-ci/desktop-shell-manifest-*.json
            desktop/electron-viewer/release-ci/desktop-update-meta-*.json
            desktop/electron-viewer/release-ci/go2rtc.Camera.Wall.Patch.*.zip

  publish:
    name: Publish GitHub Release
    needs: [build-go2rtc, build-updater, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build release manifest
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          WIN_EXE=$(find dist -name "go2rtc_${VER}_windows_amd64.exe" | head -1)
          WIN_SHA=$(cat "${WIN_EXE}.sha256" | awk '{print $1}')
          DESKTOP=$(find dist -name "*.exe" ! -name "go2rtc_*" ! -name "go2rtc-updater.exe" ! -name "go2rtc.Camera.Wall.Patch.*" | head -1)
          DESKTOP_NAME=$(basename "$DESKTOP")
          DESKTOP_VER=$(echo "$DESKTOP_NAME" | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | tail -1)
          META=$(find dist -name "desktop-update-meta-${VER}.json" | head -1)
          SHELL_CHANGED=true
          UPDATE_KIND=full
          PATCH_FILE=""
          PATCH_SHA=""
          if [ -n "${META}" ] && [ -f "${META}" ]; then
            SHELL_CHANGED=$(node -e "process.stdout.write(String(JSON.parse(require('fs').readFileSync('${META}','utf8')).shell_changed))")
            UPDATE_KIND=$(node -e "process.stdout.write(String(JSON.parse(require('fs').readFileSync('${META}','utf8')).update_kind||'full'))")
            PATCH_FILE=$(node -e "process.stdout.write(String(JSON.parse(require('fs').readFileSync('${META}','utf8')).patch_file||''))")
            PATCH_SHA=$(node -e "process.stdout.write(String(JSON.parse(require('fs').readFileSync('${META}','utf8')).patch_sha256||''))")
          fi
          cat > release-manifest.json <<EOF
          {
            "version": "${VER}",
            "released_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "go2rtc": {
              "windows": {
                "amd64": {
                  "file": "go2rtc_${VER}_windows_amd64.exe",
                  "sha256": "${WIN_SHA}"
                }
              }
            },
            "desktop": {
              "version": "${DESKTOP_VER}",
              "shell_changed": ${SHELL_CHANGED},
              "update_kind": "${UPDATE_KIND}",
              "shell_manifest": "desktop-shell-manifest-${VER}.json",
              "update_meta": "desktop-update-meta-${VER}.json",
              "patch_file": "${PATCH_FILE}",
              "patch_sha256": "${PATCH_SHA}",
              "windows": {
                "file": "${DESKTOP_NAME}"
              }
            }
          }
          EOF
          cat release-manifest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/**/*
            release-manifest.json
          fail_on_unmatched_files: false
