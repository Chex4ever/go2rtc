name: Viewer & Desktop tests

on:
  push:
    paths:
      - 'desktop/electron-viewer/**'
      - 'www/stream-url-variants-lib.js'
      - 'www/viewer/**'
      - 'www/settings-app.js'
      - 'internal/viewer/**'
      - '.github/workflows/viewer-desktop-test.yml'
  pull_request:
    paths:
      - 'desktop/electron-viewer/**'
      - 'www/stream-url-variants-lib.js'
      - 'www/viewer/**'
      - 'www/settings-app.js'
      - 'internal/viewer/**'
      - '.github/workflows/viewer-desktop-test.yml'
  workflow_dispatch:

jobs:
  js-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Electron viewer test deps
        working-directory: desktop/electron-viewer
        run: npm install --no-audit --no-fund

      - name: Electron viewer unit tests
        working-directory: desktop/electron-viewer
        run: npm test

  go-viewer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Viewer module tests
        run: go test ./internal/viewer/... -count=1

      - name: go2rtc build (embeds www/viewer)
        run: go build -o /dev/null .
