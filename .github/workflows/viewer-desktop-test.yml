name: Viewer & Desktop tests

on:
  push:
    paths:
      - 'desktop/electron-viewer/**'
      - 'scripts/build-desktop-patch.mjs'
      - 'scripts/desktop-shell-manifest.mjs'
      - 'scripts/validate-desktop-update-meta.mjs'
      - 'www/stream-url-variants-lib.js'
      - 'www/viewer/**'
      - 'www/settings-app.js'
      - 'internal/viewer/**'
      - 'internal/release/**'
      - '.github/workflows/viewer-desktop-test.yml'
  pull_request:
    paths:
      - 'desktop/electron-viewer/**'
      - 'scripts/build-desktop-patch.mjs'
      - 'scripts/desktop-shell-manifest.mjs'
      - 'scripts/validate-desktop-update-meta.mjs'
      - 'www/stream-url-variants-lib.js'
      - 'www/viewer/**'
      - 'www/settings-app.js'
      - 'internal/viewer/**'
      - 'internal/release/**'
      - '.github/workflows/viewer-desktop-test.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  js-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/electron-viewer/package-lock.json

      - name: Install Electron viewer deps (locked)
        working-directory: desktop/electron-viewer
        run: npm ci --no-audit --no-fund

      - name: Electron viewer unit tests
        working-directory: desktop/electron-viewer
        run: npm test

  go-viewer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Viewer and release module tests
        run: |
          go test ./internal/viewer/... ./internal/release/... -count=1

      - name: go2rtc build (embeds www/viewer)
        run: go build -o /dev/null .
