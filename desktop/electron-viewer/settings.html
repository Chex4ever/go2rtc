<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server settings</title>
    <style>
        body {
            font-family: system-ui, Segoe UI, sans-serif;
            margin: 0;
            padding: 20px 24px;
            background: #f5f5f5;
        }
        h1 {
            font-size: 1.1rem;
            margin: 0 0 12px;
        }
        label {
            display: block;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }
        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            margin-top: 4px;
            padding: 8px 10px;
            font-size: 1rem;
        }
        .check {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .actions {
            margin-top: 16px;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        button {
            padding: 8px 16px;
            font-size: 0.95rem;
            cursor: pointer;
        }
        button.primary {
            background: #1565c0;
            color: #fff;
            border: 1px solid #0d47a1;
        }
        .hint {
            color: #555;
            font-size: 0.85rem;
            margin: 0 0 12px;
        }
    </style>
</head>
<body>
    <h1>go2rtc server</h1>
    <p class="hint">Camera wall loads <code>/viewer/</code> on this host. go2rtc must be running separately (or as a service).</p>
    <form id="form">
        <label>
            Server URL
            <input id="server" type="text" placeholder="http://192.168.1.10:1984" required>
        </label>
        <label class="check">
            <input id="insecure" type="checkbox">
            Allow self-signed HTTPS (LAN only)
        </label>
        <div class="actions">
            <button type="submit" class="primary">Save &amp; reload</button>
        </div>
    </form>
    <script>
        const form = document.getElementById('form');
        const server = document.getElementById('server');
        const insecure = document.getElementById('insecure');

        viewerSettings.get().then((cfg) => {
            server.value = cfg.serverUrl || 'http://127.0.0.1:1984';
            insecure.checked = !!cfg.allowInsecureHttps;
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await viewerSettings.save({
                serverUrl: server.value,
                allowInsecureHttps: insecure.checked,
            });
        });
    </script>
</body>
</html>
